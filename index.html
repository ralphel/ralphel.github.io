<!DOCTYPE html>
<html>
<head>
    <title>plot scrawl</title>
    <link href="https://fonts.googleapis.com/css?family=Monoton&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Gentium+Book+Basic&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
<h1>plot scrawl</h1>
<p> - welcome, stay a while - </p>
<br><br>
<center>
    <p id="lblGreetings"></p>
    <script>
    var myDate = new Date();
    var hrs = myDate.getHours();

    var greet;

    if (hrs < 12)
        greet = 'good morning,<br><br> i cant think of anything to<br> do so im going to make a <br>site and hope that it finds<br> a purpose along the way';
    else if (hrs >= 12 && hrs <= 17)
        greet = 'good afternoon,<br><br> i cant think of anything to<br> do so im going to make a <br>site and hope that it finds<br> a purpose along the way';
    else if (hrs >= 17 && hrs <= 24)
        greet = 'good evening,<br><br> i cant think of anything to<br> do so im going to make a <br>site and hope that it finds<br> a purpose along the way';

    document.getElementById('lblGreetings').innerHTML =
        '<h3>' + greet + '</h3>';
    </script>
    <br><br>
    <img src="rocket.jpg" alt="nh">
</center>
<br><br><br><br><br><br><br><br>
<h2>a little project by eli.</h2>
</body>
</html>
